<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Potencial do Biogás no Agronegócio</title>

    
</head>

<body>

    <div class="container">

        <div class="topo">
            <input type="text" id="nome" placeholder="Digite seu nome">
        </div>

        <h1>
            Potencial do <span>Biogás</span> no Agronegócio 🌱
        </h1>


        <button class="botao-gas" onclick="entrar()">
            ⛽
        </button>

        <p class="texto-botao">
            Clique para continuar
        </p>

    </div>

    <script>
        function entrar() {
            let nome = document.getElementById("nome").value;

            if (nome === "") {
                document.getElementById("mensagem").innerHTML =
                "Digite seu nome para continuar.";
            } else {
                document.getElementById("mensagem").innerHTML =
                "Olá, " + nome + "! O biogás transforma resíduos em energia limpa para o agronegócio.";
            }
        }
    </script>

</body>
</html>
